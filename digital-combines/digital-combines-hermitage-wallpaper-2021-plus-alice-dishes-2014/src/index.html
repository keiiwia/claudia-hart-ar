<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Digital Combines (Hermitage) Wallpaper, 2021 + Alices Dishes, 2014</title>
  <meta itemprop="name" content="Digital Combines (Hermitage) Wallpaper, 2021 + Alices Dishes, 2014">
  <meta name="twitter:title" content="Digital Combines (Hermitage) Wallpaper, 2021 + Alices Dishes, 2014">
  <meta property="og:title" content="Digital Combines (Hermitage) Wallpaper, 2021 + Alices Dishes, 2014">
  <meta property="og:site_name" content="Digital Combines (Hermitage) Wallpaper, 2021 + Alices Dishes, 2014">
  <meta name="description" content="">
  <meta itemprop="description" content="">
  <meta property="og:description" content="">
  <meta name="twitter:description" content="">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">

<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.3.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Other external scripts and meta tags can also be added. -->
<meta name="apple-mobile-web-app-capable" content="yes"/>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true; webgl2: true;"
  xrweb="disableWorldTracking: true">
  <a-assets>
    <a-asset-item id="flower-matrix" src="assets/augments/flower-matrix.glb"></a-asset-item>
    <a-asset-item id="glitch-picassos" src="assets/augments/glitch-picassos.glb"></a-asset-item>
    <a-asset-item id="henri" src="assets/augments/henri.glb"></a-asset-item>
    <a-asset-item
      id="linear-leather-still-life-guitar"
      src="assets/augments/linear-leather-still-life-guitar.glb"></a-asset-item>
    <a-asset-item
      id="matisse-still-life"
      src="assets/augments/matisse-still-life.glb"></a-asset-item>
    <a-asset-item id="nue-morte-round" src="assets/augments/nue-morte-round.glb"></a-asset-item>
    <img id="og-15-thumb" src="assets/augments/og-15.jpg" />
    <img id="og-16-thumb" src="assets/augments/og-16.jpg" />
    <img id="og-6-thumb" src="assets/augments/og-6.jpg" />
    <img id="og-8-thumb" src="assets/augments/og-8.jpg" />
    <video
      id="og-15"
      autoplay
      muted
      crossorigin="anonymous"
      loop="true"
      src="assets/augments/og-15.mp4"></video>
    <video
      id="og-16"
      autoplay
      muted
      crossorigin="anonymous"
      loop="true"
      src="assets/augments/og-16.mp4"></video>
    <video
      id="og-6"
      autoplay
      muted
      crossorigin="anonymous"
      loop="true"
      src="assets/augments/og-6.mp4"></video>
    <video
      id="og-8"
      autoplay
      muted
      crossorigin="anonymous"
      loop="true"
      src="assets/augments/og-8.mp4"></video>
  </a-assets>

  <a-camera position="0 4 10" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="0.7"></a-light>

  <xrextras-named-image-target name="zigzag-cloth-noise">
    <xrextras-target-video-fade video="#og-15" height="1" width="1.35"></xrextras-target-video-fade>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="weird-eastern">
    <xrextras-target-video-fade video="#og-8" height="1" width="1.35"></xrextras-target-video-fade>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="joyful-noise-orange">
    <xrextras-target-video-fade video="#og-16" height="1" width="1.35"></xrextras-target-video-fade>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="red-arp-noise">
    <xrextras-target-video-fade video="#og-6" height="1" width="1.35"></xrextras-target-video-fade>
  </xrextras-named-image-target>

  <!-- Note: "name:" must be set to the name of the image target uploaded to the 8th Wall Console -->
  <xrextras-named-image-target name="random-glitch-plate-photo">
    <a-entity scale="0.25 0.25 0.25" rotation="90 0 0" gltf-model="#glitch-picassos"></a-entity>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="qr-dish-trackable">
    <a-entity
      position="0 -0.18 0"
      scale="0.55 0.55 0.55"
      rotation="90 0 0"
      gltf-model="#flower-matrix"></a-entity>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="nue-morte-round-dish">
    <a-entity scale="3 3 3" rotation="90 0 0" gltf-model="#nue-morte-round"></a-entity>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="mirror-glit-dish-trackable">
    <a-entity scale="0.4 0.4 0.4" rotation="90 0 0" gltf-model="#henri"></a-entity>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="linear-leather-dish-trackable">
    <a-entity
      scale="48 48 48"
      rotation="90 0 0"
      gltf-model="#linear-leather-still-life-guitar"></a-entity>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="emoji-tartan-dish-trackable">
    <a-entity scale="47 47 47" rotation="90 0 0" gltf-model="#matisse-still-life"></a-entity>
  </xrextras-named-image-target>
</a-scene>

</body>

</html>
