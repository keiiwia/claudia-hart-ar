<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Claudia Hart AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100%;
      background: #f5f0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #1a1a1a;
    }

    header {
      padding: 48px 24px 32px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    header p {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.5;
      letter-spacing: 0.06em;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a.card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    a.card:active { background: #ede8df; transform: scale(0.98); }

    .card-text {}
    .card-title {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .card-sub {
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.45;
      letter-spacing: 0.03em;
    }

    .card-arrow {
      opacity: 0.25;
      flex-shrink: 0;
      margin-left: 12px;
    }

    footer {
      text-align: center;
      padding-bottom: 32px;
      font-size: 11px;
      opacity: 0.3;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<header>
  <h1>Claudia Hart AR</h1>
  <p>Select an experience to begin</p>
</header>

<main>
  <a class="card" href="machiavelli/">
    <div class="card-text">
      <div class="card-title">Machiavelli</div>
      <div class="card-sub">9 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <a class="card" href="alice-walking/">
    <div class="card-text">
      <div class="card-title">Alice Walking</div>
      <div class="card-sub">12 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <a class="card" href="alice-xr/">
    <div class="card-text">
      <div class="card-title">Alice XR</div>
      <div class="card-sub">4 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <a class="card" href="digital-combines/">
    <div class="card-text">
      <div class="card-title">Digital Combines</div>
      <div class="card-sub">8 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <a class="card" href="russian-roulette/">
    <div class="card-text">
      <div class="card-title">Russian Roulette</div>
      <div class="card-sub">8 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <a class="card" href="ruins/">
    <div class="card-text">
      <div class="card-title">Ruins</div>
      <div class="card-sub">8 targets</div>
    </div>
    <svg class="card-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 4l6 6-6 6" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</main>

<footer>keiiwia.github.io/claudia-hart-ar</footer>

</body>
</html>
