<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- A-Frame must load BEFORE mindar-image-aframe -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script>
    AFRAME.registerComponent('play-on-target', {
      init() {
        const video = document.querySelector(this.el.getAttribute('src'));
        const target = this.el.parentEl;
        target.addEventListener('targetFound', () => { if (video) video.play().catch(() => {}); });
        target.addEventListener('targetLost',  () => { if (video) video.pause(); });
      }
    });
  </script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { background: transparent; }
    #debug {
      position: fixed; top: 10px; left: 10px; z-index: 9999;
      background: rgba(0,0,0,0.75); color: #0f0;
      padding: 10px 14px; font: 12px/1.6 monospace;
      border-radius: 6px; max-width: 90vw;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="debug">⏳ Waiting for scene…</div>

  <a-scene
    mindar-image="imageTargetSrc: machiavelli/image-targets/targets.mind; autoStart: true"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Simple coloured plane so we know tracking is working even without video -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane color="#00f" opacity="0.7" width="1" height="0.75" position="0 0 0"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const d = document.getElementById('debug');
    const log = (msg) => { d.innerHTML += '<br>' + msg; console.log(msg); };

    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded',   () => log('✅ scene loaded'));
    scene.addEventListener('arReady',  () => log('✅ arReady — camera live'));
    scene.addEventListener('arError',  (e) => log('❌ arError: ' + JSON.stringify(e.detail)));

    // Check camera permission
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(() => log('✅ camera permission granted'))
      .catch((e) => log('❌ camera denied: ' + e.message));

    setTimeout(() => log('⏱ 5s elapsed'), 5000);
    setTimeout(() => log('⏱ 10s elapsed'), 10000);
  </script>
</body>
</html>
