<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrweb="disableWorldTracking:true;"
  renderer="colorManagement:true; webgl2: true;">

  <a-assets>

    <video
      id="vid-1"
      autoplay="true"
      muted="true"
      crossorigin="anonymous"
      loop="true"
      src="assets/1.mp4">
    </video>

    <video
      id="vid-2"
      autoplay="true"
      muted="true"
      crossorigin="anonymous"
      loop="true"
      src="assets/2.mp4">
    </video>

    <video
      id="vid-3"
      autoplay="true"
      muted="true"
      crossorigin="anonymous"
      loop="true"
      src="assets/3.mp4">
    </video>

      autoplay="true"

    <video

    <video

    <video

    </video>

    <video
      id="vid-9"
      autoplay="true"
      muted="true"
      crossorigin="anonymous"
      loop="true"
      src="assets/9.mp4">
    </video>

    

    
  </a-assets>

  <a-camera
    position="0 4 10"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="0.7"></a-light>

  <!-- Note: "name:" must be set to the name of the image target uploaded to the 8th Wall Console -->

  
  <xrextras-named-image-target name="1">
    <xrextras-target-video-fade 
      video="#vid-1"
      height="1"
      width="1.35"
     ></xrextras-target-video-fade>
  </xrextras-named-image-target>

  <xrextras-named-image-target name="2">
